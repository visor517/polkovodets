<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}Полководец - Наполеоновские войны{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/game.css">
    {% block extra_head %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Верхнее меню (заглушка) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">⚔️ ПОЛКОВОДЕЦ</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'rules' %}">Правила</a>
                <a class="nav-link" href="#">Профиль</a>
                {% if user.is_authenticated %}
                    <span class="nav-link text-light">👤 {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link" style="color: #ffc107;">Выйти</button>
                    </form>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Войти</a>
                    <a class="nav-link" href="{% url 'register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <div class="container-fluid py-3 h-100">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer py-3 bg-dark border-top">
        <div class="container-fluid text-end">
            <span class="text-light">© 2026 Полководец</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
