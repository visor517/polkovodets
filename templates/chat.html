<!-- Объединённый блок чата и лога боя -->
<div class="chat-container d-flex flex-column h-100">
    <h6 class="border-bottom pb-2 mb-3">💬 Чат и лог боя</h6>

    <!-- Единый поток сообщений -->
    <div id="chatLog" class="chat-messages bg-light rounded p-2 mb-3 flex-grow-1"
        style="overflow-y: auto; font-size: 13px; min-height: 0;">
        <div class="text-muted small">Добро пожаловать в игру!</div>
    </div>

    <!-- Поле ввода и кнопка отправки (пока неактивны) -->
    <div class="input-group">
        <input type="text" class="form-control form-control-sm" placeholder="Введите сообщение..." id="chatInput"
            disabled>
        <button class="btn btn-sm btn-outline-primary" id="chatSendButton" disabled>Отправить</button>
    </div>

    <!-- Опционально: переключатель показа лога боя (если нужно) -->
    <div class="form-check form-switch mt-3">
        <input class="form-check-input" type="checkbox" id="showBattleLogToggle" checked>
        <label class="form-check-label" for="showBattleLogToggle">
            Показывать лог боя в чате
        </label>
    </div>
</div>
