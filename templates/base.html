<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>{% block title %}Полководец - Наполеоновские войны{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/game.css">
    {% block extra_head %}{% endblock %}
</head>

<body class="d-flex flex-column">
    <!-- Верхнее меню (заглушка) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">⚔️ ПОЛКОВОДЕЦ</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="#">Правила</a>
                <a class="nav-link" href="#">Формирование</a>
                <a class="nav-link" href="#">Профиль</a>
                <a class="nav-link" href="#">Выйти</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-3 mb-5 main-container flex-grow-1">
        {% block content %}{% endblock %}
    </div>

    <!-- Подвал -->
    <footer class="footer py-3 bg-dark border-top">
        <div class="container-fluid text-end">
            <span class="text-light">© 2026 Полководец</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
